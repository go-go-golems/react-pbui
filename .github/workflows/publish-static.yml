name: publish-static

on:
  pull_request:
    paths:
      - Dockerfile.static
      - .dockerignore
      - .github/workflows/publish-static.yml
      - deploy/gitops-targets.json
      - apps/demos/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.base.json
  push:
    branches: [main]
    paths:
      - Dockerfile.static
      - .dockerignore
      - .github/workflows/publish-static.yml
      - deploy/gitops-targets.json
      - apps/demos/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.base.json
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: write
  id-token: write

concurrency:
  group: publish-pbui-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    uses: go-go-golems/infra-tooling/.github/workflows/publish-ghcr-image.yml@main
    secrets: inherit
    with:
      setup_go: false
      dockerfile: ./Dockerfile.static
      build_context: .
      # Dockerfile.static performs the real pnpm/Vite build; the reusable image
      # workflow deliberately has no Node runtime setup.
      test_command: test -f apps/demos/index.html
      image_name: ghcr.io/go-go-golems/pbui-demo-static
      gitops_target_config: deploy/gitops-targets.json
      push_image: ${{ github.event_name != 'pull_request' }}
      open_gitops_pr: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
      gitops_pr_token_source: vault
      vault_role: react-pbui-gitops-pr
      vault_secret_path: kv/data/ci/github/react-pbui/gitops-pr-token
      tooling_repository: go-go-golems/infra-tooling
      tooling_ref: main
